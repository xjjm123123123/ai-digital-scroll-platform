
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豳风图 - AI数字长卷交互平台</title>
    <link rel="icon" type="image/png" href="/images/logo/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0c;
            color: #f0e6d2;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
        }
        .chinese-font {
            font-family: 'Zhi Mang Xing', cursive;
            font-weight: 400;
            font-synthesis: none;
        }
        /* 1. 宣纸纹理叠层：物理质感模拟 */
        .xuan-paper-overlay {
            position: fixed; /* 固定定位，覆盖全屏 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 穿透交互：确保纹理层不阻挡用户点击底层元素 */
            z-index: 999; /* 置于顶层，确保纹理覆盖所有内容 */
            opacity: 0.12; /* 细微透明度，避免纹理过重影响阅读 */
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); /* 真实纸张纹理图 */
            mix-blend-mode: overlay; /* 核心算法：叠加混合模式，将纹理亮度信息与底色融合 */
        }
        .glass-panel {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
        /* 2. 水墨发光：古铜金呼吸光效 */
        .ink-glow {
            /* 使用 drop-shadow 滤镜而非 box-shadow，以贴合不规则图形（如Logo文字）边缘产生投影 */
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.5));
            animation: pulse-glow 3s ease-in-out infinite; /* 3秒周期的呼吸循环动画 */
        }

        @keyframes pulse-glow {
            /* 0% 和 100%：光晕收缩变淡 */
            0%, 100% { filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.3)); }
            /* 50%：光晕扩散变强，模拟呼吸感 */
            50% { filter: drop-shadow(0 0 25px rgba(197, 160, 89, 0.8)); }
        }
        .red-seal {
            background-color: #b22222;
            color: white;
            font-family: 'Zhi Mang Xing', cursive;
            padding: 4px 8px;
            border-radius: 2px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 3. 水墨脉冲：交互热点扩散动效 */
        @keyframes ink-pulse {
            /* 初始状态：略小，不可见 */
            0% { transform: scale(0.8); opacity: 0; }
            /* 中间状态：显现，模拟墨滴入水 */
            50% { opacity: 0.3; }
            /* 结束状态：扩散至2倍大小并消散，模拟墨迹晕开 */
            100% { transform: scale(2); opacity: 0; }
        }
        .ink-pulse {
            animation: ink-pulse 2s ease-out infinite; /* 2秒周期的向外扩散动画 */
        }
        @keyframes hotspot-blink {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 1; }
        }
        .hotspot-blink {
            animation: hotspot-blink 2.2s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="xuan-paper-overlay"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
